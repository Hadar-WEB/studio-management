<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Clay - Premium App</title>
    
    <link rel="stylesheet" href="appstyle.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyCuVJfd5mj7zoVxlDZoVNgan-aP1mcXuHE",
          authDomain: "studioshalem-eca37.firebaseapp.com",
          projectId: "studioshalem-eca37",
          storageBucket: "studioshalem-eca37.firebasestorage.app",
          messagingSenderId: "268091844852",
          appId: "1:268091844852:web:ec69dcc939b38772cf16a1",
          measurementId: "G-HJWCY858DZ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const LOGO_SRC = "images/LOGO1.png"; 
        const MAGIC_PASSWORD = "StudioShalem2026!!!"; 

        const App = () => {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null); 
            const [isAdmin, setIsAdmin] = useState(localStorage.getItem('is_admin') === 'true');
            
            const [authMode, setAuthMode] = useState('login'); 
            const [loading, setLoading] = useState(false);
            
            const [activeTab, setActiveTab] = useState('guided');
            const [historyView, setHistoryView] = useState('list');
            
            const [slots, setSlots] = useState([]);
            const [swaps, setSwaps] = useState([]);
            const [waitlist, setWaitlist] = useState([]);
            const [manualHours, setManualHours] = useState([]);
            const [wheelDescriptions, setWheelDescriptions] = useState({});
            
            const [allStudents, setAllStudents] = useState([]);

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged((user) => {
                    setSession(user ? { user: { id: user.uid, email: user.email } } : null);
                    if (user) {
                        fetchProfile(user.uid);
                    } else {
                        setProfile(null);
                        setSlots([]);
                    }
                });

                const unsubscribeSlots = db.collection('open_studio')
                    .orderBy('slot_date')
                    .onSnapshot(snapshot => {
                        const slotsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setSlots(slotsData);
                    });

                const unsubscribeSwaps = db.collection('swap_market')
                    .orderBy('created_at', 'desc')
                    .onSnapshot(snapshot => {
                        const swapsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setSwaps(swapsData);
                    });

                fetchData();

                return () => {
                    unsubscribeAuth();
                    unsubscribeSlots();
                    unsubscribeSwaps();
                };
            }, []);

            // מושך את רשימת כל התלמידים למנהל עבור ההשלמה האוטומטית
            useEffect(() => {
                if (isAdmin) {
                    const unsub = db.collection('profiles').onSnapshot(snap => {
                        const names = snap.docs.map(doc => doc.data().full_name).filter(Boolean);
                        setAllStudents(names);
                    });
                    return () => unsub();
                }
            }, [isAdmin]);

            const fetchProfile = async (userId) => {
                try {
                    const docSnap = await db.collection('profiles').doc(userId).get();
                    if (docSnap.exists && docSnap.data().full_name) {
                        setProfile(docSnap.data());
                    } else {
                        setProfile({ id: userId, email: auth.currentUser?.email, full_name: "" });
                        setShowNameModal(true);
                    }
                } catch (error) {
                    console.error("Error fetching profile:", error);
                }
            };

            const fetchData = async () => {
                try {
                    const waitSnap = await db.collection('waitlist').get();
                    setWaitlist(waitSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    const hoursSnap = await db.collection('open_studio_hours').get();
                    setManualHours(hoursSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    const infoSnap = await db.collection('wheel_info').get();
                    const d = {}; 
                    infoSnap.forEach(doc => { d[doc.id] = doc.data().description; });
                    setWheelDescriptions(d);
                } catch (error) {}
            };

            const handleSignUp = async (name, email) => {
                if (!name || name.trim() === "") return alert("חובה להזין שם מלא");
                if (!email || email.trim() === "") return alert("חובה להזין אימייל");
                setLoading(true);
                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email.trim(), MAGIC_PASSWORD);
                    const user = userCredential.user;
                    await db.collection('profiles').doc(user.uid).set({
                        id: user.uid, email: email.trim(), full_name: name.trim(), created_at: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (error) { 
                    if (error.code === 'auth/email-already-in-use') {
                        alert("המייל הזה כבר רשום במערכת. אנא עברו למסך ההתחברות.");
                    } else {
                        alert("שגיאה בהרשמה: " + error.message); 
                    }
                }
                setLoading(false);
            };

            const handleSignIn = async (email) => {
                if (!email || email.trim() === "") return alert("חובה להזין אימייל");
                setLoading(true);
                try { 
                    await auth.signInWithEmailAndPassword(email.trim(), MAGIC_PASSWORD); 
                } 
                catch (error) { 
                    alert("המייל לא נמצא במערכת, או שהוזן לא נכון. האם נרשמת בעבר?"); 
                }
                setLoading(false);
            };

            const handleLogout = async () => {
                await auth.signOut();
                localStorage.removeItem('is_admin');
                setIsAdmin(false); setProfile(null); setSession(null); setAuthMode('login');
                window.location.reload();
            };

            const handleSaveName = async (newName) => {
                if (!newName || newName.trim() === "") return alert("חייב להזין שם");
                const user = auth.currentUser;
                if (!user) return;
                try {
                    await db.collection('profiles').doc(user.uid).set({
                        id: user.uid, email: user.email, full_name: newName, updated_at: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    setProfile({ ...profile, full_name: newName }); setShowNameModal(false);
                } catch (error) { alert(error.message); }
            };

            const toggleAdmin = () => {
                if (isAdmin) { handleLogout(); } 
                else { const p = prompt("קוד מנהל:"); if (p === "1234") { setIsAdmin(true); localStorage.setItem('is_admin', 'true'); } }
            };

            const handleAddSlot = async (e) => {
                e.preventDefault();
                const d = e.target.d.value;
                const t = e.target.t.value;
                
                // התיקון לבעיית התאריך: במקום חסימת דפדפן שקטה, הודעה ברורה
                if (!d) return alert("שים לב: חובה לבחור תאריך מדויק מהיומן (כולל שנה).");
                if (!t) return alert("יש להזין שעת התחלה וסיום.");

                const type = activeTab;
                const assignments = {};
                if (type === 'guided' || type === 'open') {
                     for(let i=1; i<=5; i++) {
                        const name = e.target[`w${i}`] ? e.target[`w${i}`].value.trim() : "";
                        if (name) assignments[i.toString()] = name;
                    }
                }
                try {
                    await db.collection('open_studio').add({ slot_date: d, start_time: t, lesson_type: type, wheel_assignments: assignments });
                    alert("השיעור פורסם בהצלחה בלוח!");
                    e.target.reset();
                } catch (error) { 
                    console.error("Error:", error); 
                    alert("שגיאה. האם עדכנת את הגדרות ה-Rules בפיירבייס כפי שהסברתי?");
                }
            };

            const bookWheel = async (slotId, wheelId) => {
                if (!profile && !isAdmin) return alert("חסר פרופיל");
                const slot = slots.find(s => s.id === slotId);
                let nameToBook = profile?.full_name;

                if (isAdmin) {
                    const current = slot.wheel_assignments?.[wheelId] || "";
                    nameToBook = prompt("מנהל - הזן שם (או ריק למחיקה):", current);
                    if (nameToBook === null) return;
                    if (nameToBook.trim() === "") { 
                        const upd = { ...slot.wheel_assignments }; delete upd[wheelId];
                        await db.collection('open_studio').doc(slotId).update({ wheel_assignments: upd });
                        setSelectedWheelInfo(null); return;
                    }
                }

                if (Object.values(slot.wheel_assignments || {}).includes(nameToBook) && !isAdmin) {
                    return alert("שגיאה: התלמיד כבר רשום.");
                }

                const upd = { ...slot.wheel_assignments, [wheelId]: nameToBook };
                await db.collection('open_studio').doc(slotId).update({ wheel_assignments: upd });
                
                if (!isAdmin && confirm("נרשמת! להוסיף ליומן?")) addToCalendar(slot.slot_date, slot.start_time);
                setSelectedWheelInfo(null);
            };

            const handleCancel = async (slot, wheelId) => {
                const startTime = slot.start_time.split('-')[0].trim();
                const diff = (new Date(`${slot.slot_date}T${startTime}`) - new Date()) / (1000 * 60 * 60);

                if (!isAdmin && diff < 48) {
                    if (confirm("פחות מ-48 שעות. לפרסם בקהילה?")) {
                        await db.collection('swap_market').add({
                            original_student: profile.full_name, original_user_id: session.user.id,
                            slot_id: slot.id, wheel_id: wheelId, slot_date: slot.slot_date, start_time: slot.start_time,
                            created_at: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        alert("הבקשה פורסמה!"); setActiveTab('community');
                    }
                    return;
                }

                if (confirm(isAdmin ? "למחוק את התלמיד?" : "למחוק רישום?")) {
                    const upd = { ...slot.wheel_assignments }; delete upd[wheelId];
                    await db.collection('open_studio').doc(slot.id).update({ wheel_assignments: upd });
                }
            };

            const handleDeleteSlot = async (slotId) => {
                if(confirm("למחוק את כל השיעור?")) await db.collection('open_studio').doc(slotId).delete();
            };

            const handleManagerCancelSwap = async (swapItem) => {
                if(!confirm(`האם לאשר ביטול ל-${swapItem.original_student}?`)) return;
                const slotDoc = await db.collection('open_studio').doc(swapItem.slot_id).get();
                if (slotDoc.exists) {
                    const assignments = { ...slotDoc.data().wheel_assignments };
                    delete assignments[swapItem.wheel_id];
                    await db.collection('open_studio').doc(swapItem.slot_id).update({ wheel_assignments: assignments });
                }
                await db.collection('swap_market').doc(swapItem.id).delete();
            };

            const executeSwap = async (swapItem) => {
                if (swapItem.original_student === profile.full_name) return alert("לא ניתן להחליף עצמך.");
                if (!confirm(`להחליף את ${swapItem.original_student}?`)) return;

                const slotDoc = await db.collection('open_studio').doc(swapItem.slot_id).get();
                if (!slotDoc.exists) return alert("השיעור לא קיים");
                if (slotDoc.data().wheel_assignments[swapItem.wheel_id] !== swapItem.original_student) {
                    alert("המקום השתנה."); await db.collection('swap_market').doc(swapItem.id).delete(); return;
                }

                const assignments = { ...slotDoc.data().wheel_assignments };
                assignments[swapItem.wheel_id] = profile.full_name;
                await db.collection('open_studio').doc(swapItem.slot_id).update({ wheel_assignments: assignments });
                await db.collection('swap_market').doc(swapItem.id).delete();
                alert("בוצעה החלפה!");
            };

            const joinWaitlist = async (slotId) => {
                await db.collection('waitlist').add({ slot_id: slotId, user_id: session.user.id, email: session.user.email, created_at: firebase.firestore.FieldValue.serverTimestamp() });
                alert("נוספת להמתנה!");
            };

            const addToCalendar = (date, time) => {
                const [startH, endH] = time.split('-').map(t => t.trim());
                const startDate = new Date(`${date}T${startH}`).toISOString().replace(/-|:|\.\d\d\d/g, "");
                const endDate = new Date(`${date}T${endH}`).toISOString().replace(/-|:|\.\d\d\d/g, "");
                window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=שיעור קדרות&dates=${startDate}/${endDate}&details=סטודיו&location=סטודיו`, '_blank');
            };

            const handleHoursChange = async (studentName, monthKey, hours) => {
                const docId = `${studentName}_${monthKey}`.replace(/\s+/g, '_');
                await db.collection('open_studio_hours').doc(docId).set({ student_name: studentName, month_key: monthKey, hours: hours, updated_at: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
            };

            const reportByMonth = useMemo(() => {
                if (!isAdmin) return {};
                const grouped = {};
                slots.forEach(slot => {
                    const date = new Date(slot.slot_date);
                    const monthKey = date.toLocaleString('he-IL', { month: 'long', year: 'numeric' });
                    const assignments = Object.values(slot.wheel_assignments || {});
                    if (!grouped[monthKey]) grouped[monthKey] = {};
                    assignments.forEach(studentName => {
                        if(!grouped[monthKey][studentName]) grouped[monthKey][studentName] = { guided: 0, open_count: 0 };
                        if (slot.lesson_type === 'guided') grouped[monthKey][studentName].guided++;
                        else grouped[monthKey][studentName].open_count++;
                    });
                });
                manualHours.forEach(record => {
                    if (grouped[record.month_key] && grouped[record.month_key][record.student_name]) {
                        grouped[record.month_key][record.student_name].manual_hours = record.hours;
                    } else {
                        if (!grouped[record.month_key]) grouped[record.month_key] = {};
                        if (!grouped[record.month_key][record.student_name]) grouped[record.month_key][record.student_name] = { guided: 0, open_count: 0 };
                        grouped[record.month_key][record.student_name].manual_hours = record.hours;
                    }
                });
                return grouped;
            }, [slots, manualHours, isAdmin]);

            if (!session && !isAdmin) {
                return (
                    <div className="login-wrapper">
                        <div className="login-card">
                            <img src={LOGO_SRC} className="logo-login" alt="סטודיו שלם" />
                            <h1 className="login-title">סטודיו שלם</h1>
                            <p className="login-subtitle">
                                {authMode === 'login' ? 'הכניסו מייל כדי לגשת ליומן השיבוצים' : 'הרשמה מהירה למערכת השיבוצים'}
                            </p>
                            
                            <form onSubmit={(e) => { 
                                e.preventDefault(); 
                                const email = e.target.email.value;
                                if (authMode === 'signup') {
                                    handleSignUp(e.target.name.value, email);
                                } else {
                                    handleSignIn(email);
                                }
                            }}>
                                {authMode === 'signup' && (
                                    <div className="login-form-group">
                                        <label>שם מלא (יופיע בשיבוצים)</label>
                                        <input type="text" name="name" placeholder="לדוגמה: יעל כהן" required className="clay-input" />
                                    </div>
                                )}
                                <div className="login-form-group">
                                    <label>כתובת אימייל</label>
                                    <input type="email" name="email" placeholder="your@email.com" required className="clay-input" dir="ltr" style={{textAlign: 'left'}} />
                                </div>
                                <button type="submit" disabled={loading} className="w-full btn-primary" style={{marginTop: '20px'}}>
                                    {loading ? 'טוען...' : (authMode === 'login' ? 'כניסה ליומן' : 'הירשמו עכשיו')}
                                </button>
                            </form>
                            
                            <div style={{marginTop: '30px', paddingTop: '20px', borderTop: '1px solid rgba(155, 145, 133, 0.2)', fontSize: '15px'}}>
                                {authMode === 'login' ? (
                                    <p style={{color: 'var(--stone)'}}>
                                        פעם ראשונה כאן? <button type="button" onClick={() => setAuthMode('signup')} style={{color: 'var(--terracotta)', fontWeight: 'bold'}}>לחצו להרשמה</button>
                                    </p>
                                ) : (
                                    <p style={{color: 'var(--stone)'}}>
                                        כבר נרשמתם בעבר? <button type="button" onClick={() => setAuthMode('login')} style={{color: 'var(--terracotta)', fontWeight: 'bold'}}>לחצו לכניסה</button>
                                    </p>
                                )}
                            </div>
                        </div>
                        {authMode === 'login' && (
                            <button type="button" onClick={toggleAdmin} style={{marginTop: '40px', color: 'var(--stone)', opacity: 0.5, fontSize: '12px', letterSpacing: '2px', background: 'none', border: 'none', cursor: 'pointer'}}>
                                ADMIN ACCESS
                            </button>
                        )}
                    </div>
                );
            }

            const historySlots = slots
                .filter(s => isAdmin ? true : Object.values(s.wheel_assignments || {}).includes(profile?.full_name))
                .sort((a, b) => new Date(b.slot_date) - new Date(a.slot_date));

            return (
                <div className="max-w-lg mx-auto min-h-screen flex flex-col relative text-right bg-[url('https://www.transparenttextures.com/patterns/cream-paper.png')] pb-28">
                    
                    {/* המאגר ששומר את כל שמות התלמידים להשלמה אוטומטית */}
                    <datalist id="students-list">
                        {allStudents.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>

                    {/* Header */}
                    <header className="px-6 pt-8 pb-4 flex justify-between items-center">
                        <div>
                            <h2 className="text-xs font-bold text-[#C17B4A] tracking-wider uppercase mb-1">{isAdmin ? 'ניהול סטודיו' : 'תלמיד.ה'}</h2>
                            <div className="flex items-center gap-2">
                                <h1 className="font-display text-3xl font-bold text-[#5C3D28]">{isAdmin ? 'מנהל' : (profile?.full_name || 'אורח')}</h1>
                                {!isAdmin && <button onClick={() => setShowNameModal(true)} className="text-xs text-[#9B9185] bg-white p-2 rounded-full shadow-sm hover:shadow-md transition">✏️</button>}
                            </div>
                        </div>
                        <button onClick={handleLogout} className="text-[#9B9185] text-sm font-semibold bg-white px-4 py-2 rounded-full shadow-sm">יציאה</button>
                    </header>

                    {/* Main Content */}
                    <main className="px-4 space-y-6">
                        {isAdmin && activeTab !== 'history' && activeTab !== 'community' && (
                            <section className="card-premium p-6">
                                <h3 className="font-display text-xl font-bold text-[#5C3D28] mb-4 text-center">פתיחת מועד {activeTab === 'guided' ? 'שיעור' : 'פתוח'}</h3>
                                <form onSubmit={handleAddSlot} className="space-y-3">
                                    {/* הסרנו פה את ה-required כדי שלא יחסום אותך שקוף, אלא ייתן התראה יפה */}
                                    <input type="date" name="d" className="clay-input" />
                                    <input type="text" name="t" placeholder="שעה (למשל: 10:00-13:00)" className="clay-input" />
                                    <div className="pt-4 mt-2 border-t border-[#FFF9F0]">
                                        <p className="text-xs text-[#9B9185] mb-2 font-semibold">שיבוץ ישיר מראש (אופציונלי):</p>
                                        <div className="grid grid-cols-2 gap-2">
                                            {/* פה נמצאת ההשלמה האוטומטית מתוך רשימת התלמידים */}
                                            {[1,2,3,4,5].map(n => <input key={n} name={`w${n}`} list="students-list" autoComplete="off" placeholder={`עמדה ${n}`} className="clay-input text-sm py-2" />)}
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full btn-primary mt-2">פרסם בלוח</button>
                                </form>
                            </section>
                        )}

                        {(activeTab === 'guided' || activeTab === 'open') && slots.filter(s => s.lesson_type === activeTab).map(slot => {
                            const takenCount = Object.keys(slot.wheel_assignments || {}).length;
                            const isFull = takenCount >= 5;
                            const amIInWaitlist = session && waitlist.some(w => w.slot_id === slot.id && w.user_id === session?.user?.id);
                            
                            return (
                                <div key={slot.id} className="card-premium p-6 relative overflow-hidden">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <h4 className="font-display text-2xl font-bold text-[#5C3D28]">
                                                {new Date(slot.slot_date).toLocaleDateString('he-IL', {weekday: 'long', day: 'numeric', month: 'short'})}
                                            </h4>
                                            <p className="text-[#C17B4A] font-semibold mt-1 flex items-center gap-2">
                                                <span>🕒</span> {slot.start_time}
                                            </p>
                                        </div>
                                        {isAdmin && <button onClick={() => handleDeleteSlot(slot.id)} className="text-red-400 bg-red-50 px-3 py-1 rounded-full text-xs font-bold">מחק</button>}
                                    </div>

                                    <div className="flex justify-between items-end gap-2 relative z-10">
                                        {[1,2,3,4,5].map(wNum => {
                                            const occ = slot.wheel_assignments?.[wNum];
                                            const isMe = occ === profile?.full_name;
                                            let btnClass = "wheel-free";
                                            if (occ) btnClass = isMe ? "wheel-my" : "wheel-taken";
                                            
                                            return (
                                                <div key={wNum} className="flex flex-col items-center gap-2">
                                                    <button onClick={() => setSelectedWheelInfo({ slot, wId: wNum })} className={`wheel-btn ${btnClass}`}>
                                                        {wNum}
                                                    </button>
                                                    <span className="text-[10px] font-semibold text-[#9B9185] text-center w-12 truncate leading-tight">
                                                        {occ ? (isMe ? 'שלי' : occ.split(' ')[0]) : 'פנוי'}
                                                    </span>
                                                    {(isAdmin || isMe) && occ && <button onClick={() => handleCancel(slot, wNum)} className="text-[10px] text-[#C17B4A] font-bold">ביטול</button>}
                                                </div>
                                            )
                                        })}
                                    </div>

                                    {isFull && !isAdmin && session && !Object.values(slot.wheel_assignments || {}).includes(profile?.full_name) && (
                                        <div className="mt-6 pt-4 border-t border-[#FAF7F2] text-center">
                                            {amIInWaitlist ? 
                                                <span className="text-sm bg-[#FFF9F0] text-[#C17B4A] px-4 py-2 rounded-full font-bold">את.ה ברשימת ההמתנה ⏳</span> : 
                                                <button onClick={() => joinWaitlist(slot.id)} className="text-sm bg-white border border-[#C17B4A] text-[#C17B4A] px-6 py-2 rounded-full font-bold hover:bg-[#FFF9F0] transition">הצטרף לרשימת המתנה</button>
                                            }
                                        </div>
                                    )}
                                </div>
                            );
                        })}

                        {activeTab === 'community' && (
                            <div className="space-y-4">
                                {swaps.length === 0 && <p className="text-center text-[#9B9185] py-10 font-semibold">אין הצעות להחלפה כרגע. הכל רגוע.</p>}
                                {swaps.map(swap => (
                                    <div key={swap.id} className="card-premium p-5 flex justify-between items-center border-r-4 border-[#C17B4A]">
                                        <div>
                                            <p className="font-display font-bold text-[#5C3D28] text-xl">{swap.original_student}</p>
                                            <p className="text-sm text-[#9B9185] font-semibold">{new Date(swap.slot_date).toLocaleDateString('he-IL', {day:'numeric', month:'short'})} | {swap.start_time}</p>
                                        </div>
                                        {!isAdmin && session && <button onClick={() => executeSwap(swap)} className="btn-primary py-2 px-6 text-sm">אני מחליף!</button>}
                                        {isAdmin && <button onClick={() => handleManagerCancelSwap(swap)} className="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-xs font-bold">אשר ביטול</button>}
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-6">
                                {isAdmin && (
                                    <div className="bg-white p-1 rounded-2xl flex text-sm font-bold shadow-sm mx-auto w-fit mb-6">
                                        <button onClick={() => setHistoryView('list')} className={`px-6 py-2 rounded-xl transition ${historyView === 'list' ? 'bg-[#FAF7F2] text-[#C17B4A]' : 'text-[#9B9185]'}`}>רשימה</button>
                                        <button onClick={() => setHistoryView('report')} className={`px-6 py-2 rounded-xl transition ${historyView === 'report' ? 'bg-[#FAF7F2] text-[#C17B4A]' : 'text-[#9B9185]'}`}>דוח חודשי</button>
                                    </div>
                                )}

                                {isAdmin && historyView === 'report' && (
                                    <div className="space-y-6">
                                        {Object.keys(reportByMonth).sort((a,b) => b.localeCompare(a)).map(month => (
                                            <div key={month} className="card-premium overflow-hidden border-none p-0">
                                                <h4 className="bg-[#FAF7F2] text-[#5C3D28] font-display font-bold text-lg p-4 text-center border-b border-[#FFF9F0]">{month}</h4>
                                                <div className="overflow-x-auto p-4">
                                                    <table className="report-table">
                                                        <thead>
                                                            <tr>
                                                                <th>שם</th>
                                                                <th>מודרך</th>
                                                                <th>פתוח</th>
                                                                <th>שעות הוספו</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {Object.entries(reportByMonth[month]).map(([name, data]) => (
                                                                <tr key={name}>
                                                                    <td className="font-bold text-[#5C3D28]">{name}</td>
                                                                    <td className="text-[#C17B4A] font-bold">{data.guided}</td>
                                                                    <td className="text-[#9B9185]">{data.open_count}</td>
                                                                    <td>
                                                                        <input type="number" defaultValue={data.manual_hours || ""} placeholder="-" className="hours-input border border-[#E8DDD0] bg-[#FFF9F0] text-[#5C3D28]" onBlur={(e) => handleHoursChange(name, month, e.target.value)} />
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {(historyView === 'list' || !isAdmin) && (
                                    <div className="space-y-4">
                                        {historySlots.length === 0 && <p className="text-center text-[#9B9185] py-10 font-semibold">טרם השתתפת בשיעורים.</p>}
                                        {historySlots.map(slot => (
                                            <div key={slot.id} className="card-premium p-5 flex items-center justify-between">
                                                <div>
                                                    <p className="font-display font-bold text-[#5C3D28] text-xl">{new Date(slot.slot_date).toLocaleDateString('he-IL', {day:'numeric', month:'long'})}</p>
                                                    <p className="text-sm text-[#9B9185] font-semibold">{slot.start_time} • {slot.lesson_type === 'guided' ? 'שיעור' : 'פתוח'}</p>
                                                </div>
                                                {!isAdmin && <button onClick={() => addToCalendar(slot.slot_date, slot.start_time)} className="w-12 h-12 bg-[#FAF7F2] rounded-full flex items-center justify-center text-xl hover:bg-[#FFF9F0] transition">📅</button>}
                                                {isAdmin && <button onClick={() => handleDeleteSlot(slot.id)} className="text-red-400 text-xs font-bold underline">מחק מועד</button>}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="bottom-nav">
                        <button onClick={() => setActiveTab('guided')} className={`nav-item ${activeTab === 'guided' ? 'active' : ''}`}>
                            <span className="nav-icon">🏺</span>
                            <span>שיעורים</span>
                        </button>
                        <button onClick={() => setActiveTab('open')} className={`nav-item ${activeTab === 'open' ? 'active' : ''}`}>
                            <span className="nav-icon">👐</span>
                            <span>פתוח</span>
                        </button>
                        <button onClick={() => setActiveTab('community')} className={`nav-item ${activeTab === 'community' ? 'active' : ''}`}>
                            <span className="nav-icon">🤝</span>
                            <span>קהילה</span>
                        </button>
                        <button onClick={() => setActiveTab('history')} className={`nav-item ${activeTab === 'history' ? 'active' : ''}`}>
                            <span className="nav-icon">📝</span>
                            <span>היסטוריה</span>
                        </button>
                    </nav>

                    {/* Modals */}
                    {selected
